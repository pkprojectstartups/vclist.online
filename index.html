---
layout: default
title: "VCList.Online"
---

<h2>VC Database</h2>
<p>A database of 1500+ VC firms.</p>
<ul>
  {% for firm in site.data.vc_firms %}
    <li>
      <strong>
        <a href="{{ site.baseurl }}/vc_firms/{{ firm.id | slugify }}">{{ firm.name }}</a>
      </strong>
      <br>
      Offices: {{ firm.offices }}<br>
      Stages: {{ firm.stages }}<br>
    </li>
  {% endfor %}
</ul>
