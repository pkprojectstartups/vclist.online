<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title | default: site.title }}</title>
</head>
<body>
  <header>
    <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>© {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>
</html>
