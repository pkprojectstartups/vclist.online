# Basic Site Settings
title: "VC Database"
description: "A database of 1500+ VC firms."
baseurl: "/vclist.online"  # Path after your GitHub Pages URL
url: "https://pkprojectstartups.github.io"  # Replace with your GitHub username or organization

# Theme Settings
theme: minima

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-datapage-generator

# Pagination
paginate: 20

# Dynamic Page Generation
datapage_generator:
  datafiles:
    - vc_firms  # Points to _data/vc_firms.yml
  template: firm_page  # Layout for individual pages
  name: "id"  # Use the `id` field from the data file to name pages
  output_dir: "vc_firms"  # Directory for generated pages

# Collections
collections:
  vc_firms:
    output: true  # Ensures individual VC firm pages are generated

# Markdown Configuration
markdown: kramdown
kramdown:
  input: GFM  # GitHub Flavored Markdown

# Permalinks
permalink: pretty  # Clean URLs
